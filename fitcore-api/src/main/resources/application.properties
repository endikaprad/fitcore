# Server
server.port=8080

# PostgreSQL — lee DATABASE_URL en Render, usa defaults locales en desarrollo
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/fitcore}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
fitcore.jwt.secret=${JWT_SECRET:CHANGE_THIS_SECRET_KEY_MIN_256_BITS_FOR_PRODUCTION_USE}
fitcore.jwt.expiration-ms=86400000
fitcore.jwt.refresh-expiration-ms=2592000000

# Open Food Facts
fitcore.openfoodfacts.base-url=https://world.openfoodfacts.org

# Logging
logging.level.com.fitcore=DEBUG
logging.level.org.springframework.security=WARN
