# Server
server.port=8080

# MySQL — lee variables de entorno en Railway, usa defaults locales en desarrollo
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:fitcore}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
fitcore.jwt.secret=${JWT_SECRET:CHANGE_THIS_SECRET_KEY_MIN_256_BITS_FOR_PRODUCTION_USE}
fitcore.jwt.expiration-ms=86400000
fitcore.jwt.refresh-expiration-ms=2592000000

# Open Food Facts
fitcore.openfoodfacts.base-url=https://world.openfoodfacts.org

# Logging
logging.level.com.fitcore=DEBUG
logging.level.org.springframework.security=WARN
